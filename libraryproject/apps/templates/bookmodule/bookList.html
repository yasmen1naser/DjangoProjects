<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>

<body>

    <h2>Search Results</h2>

    {% if books %}
    <ul>
        {% for book in books %}
        <li>{{ book.title }} - {{ book.author }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No results</p>
    {% endif %}

</body>
</html>
